<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Volcano MOTD Editor</title>
<style>
  body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #fff;
         display: flex; justify-content: center; padding: 40px; }
  .box { background: #2a2a2a; padding: 24px; border-radius: 12px;
         width: 100%; max-width: 500px; box-shadow: 0 4px 24px #0008; }
  h1 { margin: 0 0 16px; color: #ff6b2b; }
  label { display: block; margin-top: 12px; font-size: 14px; color: #bbb; }
  input, textarea { width: 100%; box-sizing: border-box; padding: 10px;
                    background: #1a1a1a; color: #fff; border: 1px solid #444;
                    border-radius: 6px; font-family: inherit; font-size: 14px; }
  textarea { min-height: 100px; resize: vertical; }
  button { margin-top: 16px; padding: 12px 20px; background: #ff6b2b;
           color: #fff; border: 0; border-radius: 6px; font-weight: 600;
           cursor: pointer; font-size: 14px; }
  button:hover { background: #ff8244; }
  .status { margin-top: 12px; padding: 10px; border-radius: 6px;
            font-size: 13px; display: none; }
  .ok { background: #2b5d3a; color: #a7e9b8; display: block; }
  .err { background: #5d2b2b; color: #f0a0a0; display: block; }
  .meta { margin-top: 20px; font-size: 12px; color: #888; }
</style>
</head>
<body>
  <div class="box">
    <h1>Volcano MOTD</h1>
    <label>Current:</label>
    <div id="current" style="padding:10px;background:#1a1a1a;border-radius:6px;min-height:40px;white-space:pre-wrap;"></div>

    <label for="text">New message (max 500 chars):</label>
    <textarea id="text" maxlength="500" placeholder="Type MOTD here..."></textarea>

    <label for="pw">Admin password:</label>
    <input type="password" id="pw" placeholder="password" />

    <button id="save">Save</button>
    <div id="status" class="status"></div>
    <div class="meta" id="meta"></div>
  </div>

<script>
const $ = id => document.getElementById(id);

async function load() {
  const res = await fetch("/motd", { cache: "no-store" });
  const data = await res.json();
  $("current").textContent = data.text || "(empty)";
  $("meta").textContent = data.updated ? "Last updated: " + new Date(data.updated).toLocaleString() : "";
}

$("save").onclick = async () => {
  const text = $("text").value;
  const password = $("pw").value;
  const statusEl = $("status");
  statusEl.className = "status";
  statusEl.textContent = "Saving...";
  try {
    const res = await fetch("/motd", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password, text })
    });
    const data = await res.json();
    if (!res.ok) {
      statusEl.className = "status err";
      statusEl.textContent = data.error || "Failed";
    } else {
      statusEl.className = "status ok";
      statusEl.textContent = "Saved!";
      $("text").value = "";
      load();
    }
  } catch (e) {
    statusEl.className = "status err";
    statusEl.textContent = "Network error: " + e.message;
  }
};

load();
setInterval(load, 5000);
</script>
</body>
</html>
